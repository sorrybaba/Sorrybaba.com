<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <defs>
    <style>
      .face { fill: #FFFFFF; stroke: #FF5FA2; stroke-width: 4; }
      .eye { fill: #1F2937; }
      .heart-cheek { fill: #FF5FA2; }
      .mouth { fill: none; stroke: #1F2937; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>
  <circle cx="50" cy="50" r="48" fill="#FFD6E7" />
  <circle cx="50" cy="50" r="36" class="face" />
  <!-- Eyes -->
  <circle cx="38" cy="46" r="5" class="eye" />
  <circle cx="62" cy="46" r="5" class="eye" />
  <!-- Cute smile -->
  <path d="M 42 56 Q 50 64 58 56" class="mouth" />
  <!-- Heart Cheek -->
  <path d="M 72 52 C 71 50 68 50 67 52 C 66 54 69 57 72 59 C 75 57 78 54 77 52 C 76 50 73 50 72 52 Z" class="heart-cheek" transform="scale(0.8) translate(14, 12)" />
