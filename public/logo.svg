<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      .bg-circle { fill: #FFD6E7; }
      .face { fill: #FFFFFF; filter: drop-shadow(0px 3px 6px rgba(255, 95, 162, 0.15)); }
      .eye { fill: #1F2937; transform-origin: 38px 48px; animation: blink 4s infinite ease-in-out; }
      .eye-r { fill: #1F2937; transform-origin: 62px 48px; animation: blink 4s infinite ease-in-out; }
      .blush { fill: #FF5FA2; opacity: 0.3; }
      .heart-cheek { fill: #FF5FA2; }
      .mouth { fill: none; stroke: #1F2937; stroke-width: 3.5; stroke-linecap: round; }
      .sparkle { fill: #7CCBFF; }
      .mascot-group { animation: bob 4s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>
  <circle cx="50" cy="50" r="48" class="bg-circle" />
  <g class="mascot-group">
    <circle cx="50" cy="50" r="38" class="face" />
    
    <!-- Eyes -->
    <ellipse cx="38" cy="48" rx="4.5" ry="6" class="eye" />
    <circle cx="36" cy="46" r="1.5" fill="#FFFFFF" />
    
    <ellipse cx="62" cy="48" rx="4.5" ry="6" class="eye-r" />
    <circle cx="60" cy="46" r="1.5" fill="#FFFFFF" />
    
    <!-- Blush -->
    <ellipse cx="28" cy="56" rx="6" ry="3" class="blush" />
    
    <!-- Heart on Cheek -->
    <path d="M 72 52.5 C 70.8 50 67.5 50 66.3 52.5 C 65.1 55 68.3 58.3 72 61 C 75.7 58.3 78.9 55 77.7 52.5 C 76.5 50 73.2 50 72 52.5 Z" class="heart-cheek" transform="scale(0.8) translate(14, 10)" />
    
    <!-- Cute Smile -->
    <path d="M 44 56 Q 50 62 56 56" class="mouth" />
    
    <!-- Sparkles or blushing dots -->
    <path d="M 22 26 L 24 30 L 28 32 L 24 34 L 22 38 L 20 34 L 16 32 L 20 30 Z" class="sparkle" transform="scale(0.5) translate(16, 16)" />
  </g>
</svg>
